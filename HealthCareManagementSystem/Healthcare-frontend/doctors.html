<!DOCTYPE html>
<html>
<head>
<title>Doctors</title>
<link rel="stylesheet" href="css/styles.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
<div class="container-fluid">
<a class="navbar-brand fw-semibold" href="index.html">Healthcare Management System</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNavbar" aria-controls="topNavbar" aria-expanded="false" aria-label="Toggle navigation">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="topNavbar">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
<li class="nav-item"><a class="nav-link" href="patients.html">Patients</a></li>
<li class="nav-item"><a class="nav-link active" aria-current="page" href="doctors.html">Doctors</a></li>
<li class="nav-item"><a class="nav-link" href="appointments.html">Appointments</a></li>
</ul>
</div>
</div>
</nav>

<div class="container-fluid mt-4">
<div class="row g-3">
<aside class="col-lg-3 col-md-4">
<div class="card sidebar-nav p-3">
<h5 class="mb-3 border-bottom pb-2">Quick Navigation</h5>
<ul class="nav nav-pills flex-column gap-2">
<li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
<li class="nav-item"><a class="nav-link" href="patients.html">Patients Section</a></li>
<li class="nav-item"><a class="nav-link active" href="doctors.html">Doctors Section</a></li>
<li class="nav-item"><a class="nav-link" href="appointments.html">Appointments Section</a></li>
</ul>
</div>
</aside>

<main class="col-lg-9 col-md-8">
<div class="card p-3 mb-3">
<h2 class="mb-3">Doctors</h2>

<div class="row g-2">
<div class="col-md-4">
<label for="doctorId" class="form-label">Doctor ID</label>
<input id="doctorId" class="form-control" readonly>
</div>
<div class="col-md-8">
<label for="dname" class="form-label">Name</label>
<input id="dname" placeholder="Doctor Name" class="form-control">
</div>
<div class="col-md-6">
<label for="specialization" class="form-label">Specialization</label>
<select id="specialization" class="form-control">
<option value="">Select specialization</option>
<option>Cardiologist</option>
<option>Dentist</option>
<option>Dermatologist</option>
<option>Neurologist</option>
<option>Orthopedic</option>
<option>Genral Surgeon</option>
<option>Pediatrician</option>
<option>Radiologist</option>
<option>Psychiatrist</option>
</select>
</div>
<div class="col-md-6">
<label for="availableSlot" class="form-label">Available Time Slot</label>
<input id="availableSlot" class="form-control" placeholder="e.g. 10:00 AM - 1:00 PM">
</div>
</div>

<div class="mt-3">
<button id="saveDoctorBtn" onclick="saveDoctor()" class="btn btn-success">Add Doctor</button>
<button id="cancelDoctorEditBtn" onclick="cancelDoctorEdit()" class="btn btn-outline-secondary ms-2" style="display:none;">Cancel Edit</button>
</div>
</div>

<div class="card p-3">
<div class="table-responsive">
<table class="table mt-1">
<thead><tr><th>Doctor ID</th><th>Name</th><th>Specialization</th><th>Available Time Slot</th><th>Action</th></tr></thead>
<tbody id="doctorTable"></tbody>
</table>
</div>
</div>
</main>
</div>
</div>

<script src="js/data.js"></script>
<script src="js/doctors.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
