<!DOCTYPE html>
<html>
<head>
<title>Appointments</title>
<link rel="stylesheet" href="css/styles.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
<div class="container-fluid">
<a class="navbar-brand fw-semibold" href="index.html">Healthcare Management System</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNavbar" aria-controls="topNavbar" aria-expanded="false" aria-label="Toggle navigation">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="topNavbar">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
<li class="nav-item"><a class="nav-link" href="patients.html">Patients</a></li>
<li class="nav-item"><a class="nav-link" href="doctors.html">Doctors</a></li>
<li class="nav-item"><a class="nav-link active" aria-current="page" href="appointments.html">Appointments</a></li>
</ul>
</div>
</div>
</nav>

<div class="container-fluid mt-4">
<div class="row g-3">
<aside class="col-lg-3 col-md-4">
<div class="card sidebar-nav p-3">
<h5 class="mb-3 border-bottom pb-2">Quick Navigation</h5>
<ul class="nav nav-pills flex-column gap-2">
<li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
<li class="nav-item"><a class="nav-link" href="patients.html">Patients Section</a></li>
<li class="nav-item"><a class="nav-link" href="doctors.html">Doctors Section</a></li>
<li class="nav-item"><a class="nav-link active" href="appointments.html">Appointments Section</a></li>
</ul>
</div>
</aside>

<main class="col-lg-9 col-md-8">
<div class="card p-3 mb-3">
<h2 class="mb-3">Appointments</h2>

<div class="row g-2">
<div class="col-md-4">
<label for="appointmentId" class="form-label">Appointment ID</label>
<input id="appointmentId" class="form-control" readonly>
</div>
<div class="col-md-4">
<label for="patient" class="form-label">Patient</label>
<select id="patient" class="form-control"></select>
</div>
<div class="col-md-4">
<label for="doctor" class="form-label">Doctor</label>
<select id="doctor" class="form-control"></select>
</div>
<div class="col-md-4">
<label for="date" class="form-label">Date</label>
<input type="date" id="date" class="form-control">
</div>
<div class="col-md-4">
<label for="time" class="form-label">Time Slot</label>
<select id="time" class="form-control">
<option value="">Select time slot</option>
<option>09:00 AM</option>
<option>10:00 AM</option>
<option>11:00 AM</option>
<option>12:00 PM</option>
<option>02:00 PM</option>
<option>03:00 PM</option>
<option>04:00 PM</option>
</select>
</div>
<div class="col-md-4">
<label for="status" class="form-label">Status</label>
<select id="status" class="form-control">
<option>Booked</option>
<option>Cancelled</option>
<option>Completed</option>
</select>
</div>
</div>

<div class="mt-3">
<button onclick="bookAppointment()" class="btn btn-warning">Save Appointment</button>
</div>
</div>

<div class="card p-3">
<div class="table-responsive">
<table class="table mt-1">
<thead><tr><th>Appointment ID</th><th>Patient</th><th>Doctor</th><th>Date</th><th>Time Slot</th><th>Status</th></tr></thead>
<tbody id="appointmentTable"></tbody>
</table>
</div>
</div>
</main>
</div>
</div>

<script src="js/data.js"></script>
<script src="js/appointments.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
