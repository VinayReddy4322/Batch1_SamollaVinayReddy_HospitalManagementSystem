<!DOCTYPE html>
<html>
<head>
<title>Patients</title>
<link rel="stylesheet" href="css/styles.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
<div class="container-fluid">
<a class="navbar-brand fw-semibold" href="index.html">Healthcare Management System</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNavbar" aria-controls="topNavbar" aria-expanded="false" aria-label="Toggle navigation">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="topNavbar">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
<li class="nav-item"><a class="nav-link active" aria-current="page" href="patients.html">Patients</a></li>
<li class="nav-item"><a class="nav-link" href="doctors.html">Doctors</a></li>
<li class="nav-item"><a class="nav-link" href="appointments.html">Appointments</a></li>
</ul>
</div>
</div>
</nav>

<div class="container-fluid mt-4">
<div class="row g-3">
<aside class="col-lg-3 col-md-4">
<div class="card sidebar-nav p-3">
<h5 class="mb-3 border-bottom pb-2">Quick Navigation</h5>
<ul class="nav nav-pills flex-column gap-2">
<li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
<li class="nav-item"><a class="nav-link active" href="patients.html">Patients Section</a></li>
<li class="nav-item"><a class="nav-link" href="doctors.html">Doctors Section</a></li>
<li class="nav-item"><a class="nav-link" href="appointments.html">Appointments Section</a></li>
</ul>
</div>
</aside>

<main class="col-lg-9 col-md-8">
<div class="card p-3 mb-3">
<h2 class="mb-3">Patients</h2>

<div class="row g-2">
<div class="col-md-4">
<label for="patientId" class="form-label">Patient ID</label>
<input id="patientId" class="form-control" readonly>
</div>
<div class="col-md-8">
<label for="name" class="form-label">Name</label>
<input id="name" placeholder="Enter patient name" class="form-control">
</div>
<div class="col-md-4">
<label for="age" class="form-label">Age</label>
<input id="age" type="number" placeholder="Age" class="form-control">
</div>
<div class="col-md-8">
<label class="form-label d-block">Gender</label>
<div class="form-check form-check-inline">
<input id="genderMale" type="radio" name="gender" value="Male" class="form-check-input">
<label class="form-check-label" for="genderMale">Male</label>
</div>
<div class="form-check form-check-inline">
<input id="genderFemale" type="radio" name="gender" value="Female" class="form-check-input">
<label class="form-check-label" for="genderFemale">Female</label>
</div>
</div>
<div class="col-md-6">
<label for="email" class="form-label">Email</label>
<input id="email" type="email" placeholder="abc@gmail.com" class="form-control">
</div>
<div class="col-md-6">
<label for="phone" class="form-label">Phone</label>
<input id="phone" type="text" placeholder="10-digit phone" class="form-control">
</div>
</div>

<div class="mt-3 d-flex gap-2 flex-wrap">
<button id="savePatientBtn" class="btn btn-primary" onclick="savePatient()">Add Patient</button>
<button id="cancelEditBtn" class="btn btn-outline-secondary" onclick="cancelPatientEdit()" style="display:none;">Cancel Edit</button>
</div>
</div>

<div class="card p-3">
<div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
<h5 class="mb-0">Patient List</h5>
<input id="patientSearch" class="form-control w-auto" placeholder="Search by name or phone" oninput="displayPatients()">
</div>

<div class="table-responsive">
<table class="table mt-1">
<thead>
<tr>
<th>Patient ID</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Email</th>
<th>Phone</th>
<th>Action</th>
</tr>
</thead>
<tbody id="patientTable"></tbody>
</table>
</div>
</div>
</main>
</div>
</div>

<script src="js/data.js"></script>
<script src="js/patients.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
